<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Demo Conversación · Mibanco-confIA + YoSiLa · Mibanco</title>
<link rel="stylesheet" href="chat.css" />
</head>
<body>
<div class="page">

<!-- HEADER -->
<header class="lab-bar">
<div class="lb-left">
<span class="lb-logo">m</span>
<div class="lb-title">
<strong>Demo Conversación · Mibanco-confIA + YoSiLa</strong>
<span>Cómo se ve la IA de cobranza en WhatsApp — 2 perfiles × 5 etapas de mora</span>
</div>
</div>
<a href="index.html" class="lb-back">← Volver al dashboard</a>
</header>

<!-- MAIN -->
<div class="demo-wrap">

<!-- PANEL IZQUIERDO -->
<aside class="left-panel">
<div class="left-section">
<p class="section-title">Perfil del cliente</p>
<div id="profileList"></div>
</div>
<div class="left-section">
<p class="section-title">Etapa de mora</p>
<div class="stage-list" id="etapaList"></div>
</div>
</aside>

<!-- CHAT PANEL -->
<div class="chat-panel">

  <div class="phone-ui-wrap">

    <!-- Etiqueta flotante de app activa -->
    <div class="app-label" id="appLabel">
      <span class="app-label-wa" id="appLabelWa">💬 WhatsApp</span>
      <span class="app-label-yp" id="appLabelYp">💜 yape</span>
    </div>

    <div class="phone-container" id="phoneContainer">

      <!-- WhatsApp phone -->
      <div class="phone-wrap wa-phone" id="waPhone">
        <div class="wa-head" id="waHeader"></div>
        <div class="wa-body" id="chatBody"></div>
        <div class="wa-footer">
          <span class="wa-attach">📎</span>
          <div class="wa-input-box">Escribe un mensaje...</div>
          <div class="wa-mic">🎤</div>
        </div>
      </div>

      <!-- Yape phone (overlay, entra desde la derecha automáticamente) -->
      <div class="phone-wrap yape-phone" id="yapePhone">
        <div class="yp-status-bar">9:41 &nbsp;···· ▲ 100%</div>
        <div class="yp-head">
          <span class="yp-back">←</span>
          <span class="yp-head-title" id="yapeHeadTitle">yape</span>
          <div class="yp-head-avatar">💜</div>
        </div>
        <div class="yp-body" id="yapeBody"></div>
        <div class="yp-nav">
          <span class="yp-nav-ic active">🏠</span>
          <span class="yp-nav-ic">💜</span>
          <span class="yp-nav-ic">📋</span>
          <span class="yp-nav-ic">👤</span>
        </div>
      </div>

    </div>

    <!-- Botón replay -->
    <button class="replay-btn" id="replayBtn" title="Repetir animación">▶ Repetir</button>

  </div>

</div>

</div>
</div>

<script src="chat.js"></script>
</body>
</html>
